name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: valiantdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations (create DB)
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/valiantdb
          FLASK_APP: app.py
          FLASK_ENV: development
        run: |
          flask db init || true
          flask db migrate -m "ci init" || true
          flask db upgrade || true
      - name: Run tests
        env:
          FLASK_APP: app.py
        run: |
          pytest -q
